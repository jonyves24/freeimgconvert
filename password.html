<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Password Generator - Secure Random Passwords | FreeImageConvert</title>
    <meta name="description" content="Generate secure random passwords with custom length and character types. Free password generator.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ FreeImageConvert</h1>
        <div class="tagline">Free online tools</div>
    </div>

    <div class="tools-nav">
        <a href="index.html">← Back to all tools</a>
        <span>|</span>
        <a href="ocr.html">📷 OCR</a>
        <a href="convert.html">🖼️ Converter</a>
        <a href="resize.html">📏 Resizer</a>
        <a href="crop.html">✂️ Cropper</a>
        <a href="wordcount.html">📝 Word</a>
        <a href="tts.html">🔊 TTS</a>
        <a href="qr.html">📱 QR</a>
        <a href="color.html">🎨 Color</a>
        <a href="password.html">🔑 Password</a>
    </div>

    <div class="tool-panel">
        <div class="tool-title">🔑 Secure Password Generator</div>
        <div><label>Length: <input type="number" id="passLength" value="12" min="4" max="32"></label></div>
        <div class="checkbox-group">
            <label><input type="checkbox" id="useUpper" checked> Uppercase (A-Z)</label>
            <label><input type="checkbox" id="useLower" checked> Lowercase (a-z)</label>
            <label><input type="checkbox" id="useNumbers" checked> Numbers (0-9)</label>
            <label><input type="checkbox" id="useSymbols" checked> Symbols (!@#$%)</label>
        </div>
        <button onclick="generatePassword()">⚡ Generate Password</button>
        <div id="passResult" class="result-area">
            <input type="text" id="generatedPass" readonly>
            <button onclick="copyPassword()">📋 Copy</button>
        </div>
    </div>

    <div class="social-section">
        <h3>❤️ Enjoying this tool?</h3>
        <div class="social-buttons">
            <a href="#" class="social-btn facebook" onclick="shareFacebook()">📘 Facebook</a>
            <a href="#" class="social-btn twitter" onclick="shareTwitter()">🐦 Twitter</a>
            <a href="#" class="social-btn whatsapp" onclick="shareWhatsApp()">💬 WhatsApp</a>
        </div>
    </div>

    <footer>© 2025 FreeImageConvert.xyz — All tools run locally.</footer>
</div>

<script src="script.js"></script>
<script>
    function generatePassword() {
        const len = parseInt(document.getElementById('passLength').value);
        const upper = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const lower = 'abcdefghijklmnopqrstuvwxyz';
        const numbers = '0123456789';
        const symbols = '!@#$%^&*()_+[]{}';
        let chars = '';
        if (document.getElementById('useUpper').checked) chars += upper;
        if (document.getElementById('useLower').checked) chars += lower;
        if (document.getElementById('useNumbers').checked) chars += numbers;
        if (document.getElementById('useSymbols').checked) chars += symbols;
        if (!chars) {
            alert('Select at least one character type');
            return;
        }
        let pass = '';
        for (let i = 0; i < len; i++) {
            pass += chars[Math.floor(Math.random() * chars.length)];
        }
        document.getElementById('generatedPass').value = pass;
        document.getElementById('passResult').classList.add('show');
    }

    function copyPassword() {
        const pass = document.getElementById('generatedPass').value;
        if (!pass) {
            alert('Generate a password first');
            return;
        }
        navigator.clipboard.writeText(pass);
        showStatus('passResult', '✅ Password copied!', 'success');
    }

    function shareFacebook() { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank'); return false; }
    function shareTwitter() { window.open(`https://twitter.com/intent/tweet?text=Free%20Password%20Generator&url=${encodeURIComponent(window.location.href)}`, '_blank'); return false; }
    function shareWhatsApp() { window.open(`https://wa.me/?text=Check%20out%20this%20free%20password%20generator!%20${encodeURIComponent(window.location.href)}`, '_blank'); return false; }
</script>
</body>
</html>
