<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Color Picker - Pick HEX & RGB Colors | FreeImageConvert</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ FreeImageConvert</h1>
        <div class="tagline">Free online tools</div>
    </div>

    <div class="tools-nav">
        <a href="index.html">← Back to all tools</a>
        <span>|</span>
        <a href="ocr.html">📷 OCR</a>
        <a href="convert.html">🖼️ Converter</a>
        <a href="resize.html">📏 Resizer</a>
        <a href="crop.html">✂️ Cropper</a>
        <a href="wordcount.html">📝 Word</a>
        <a href="tts.html">🔊 TTS</a>
        <a href="qr.html">📱 QR</a>
        <a href="color.html">🎨 Color</a>
        <a href="password.html">🔑 Password</a>
    </div>

    <!-- THIS IS THE TOOL CONTENT - MAKE SURE IT'S THERE -->
    <div class="tool-panel">
        <div class="tool-title">🎨 Color Picker</div>
        <input type="color" id="colorPicker" value="#3b82f6" style="width: 100%; height: 60px; cursor: pointer;">
        <div class="color-info" style="background: #f1f5f9; padding: 16px; border-radius: 16px; margin: 16px 0; text-align: center;">
            <p><strong>HEX:</strong> <span id="hexValue">#3b82f6</span></p>
            <p><strong>RGB:</strong> <span id="rgbValue">rgb(59, 130, 246)</span></p>
        </div>
        <button onclick="copyColor()">📋 Copy HEX</button>
        <div id="colorStatus"></div>
    </div>

    <div class="social-section">
        <h3>❤️ Enjoying this tool?</h3>
        <div class="social-buttons">
            <a href="#" class="social-btn facebook" onclick="shareFacebook()">📘 Facebook</a>
            <a href="#" class="social-btn twitter" onclick="shareTwitter()">🐦 Twitter</a>
            <a href="#" class="social-btn whatsapp" onclick="shareWhatsApp()">💬 WhatsApp</a>
        </div>
    </div>

    <footer>© 2025 FreeImageConvert.xyz — All tools run locally.</footer>
</div>

<script src="script.js"></script>
<script>
    const colorPicker = document.getElementById('colorPicker');
    const hexValue = document.getElementById('hexValue');
    const rgbValue = document.getElementById('rgbValue');

    function updateColor() {
        const hex = colorPicker.value;
        hexValue.textContent = hex;
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        rgbValue.textContent = `rgb(${r}, ${g}, ${b})`;
    }

    function copyColor() {
        navigator.clipboard.writeText(colorPicker.value);
        const statusDiv = document.getElementById('colorStatus');
        statusDiv.innerHTML = '<div class="status-message status-success">✅ HEX copied!</div>';
        setTimeout(() => { statusDiv.innerHTML = ''; }, 2000);
    }

    colorPicker.addEventListener('input', updateColor);
    updateColor();

    function shareFacebook() { window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank'); return false; }
    function shareTwitter() { window.open(`https://twitter.com/intent/tweet?text=Free%20Color%20Picker&url=${encodeURIComponent(window.location.href)}`, '_blank'); return false; }
    function shareWhatsApp() { window.open(`https://wa.me/?text=Check%20out%20this%20free%20color%20picker!%20${encodeURIComponent(window.location.href)}`, '_blank'); return false; }
</script>
</body>
</html>
